<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phillip Patterson • Texture • Light • Frenzy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --accent: #c9a66b; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Helvetica Neue', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e8e0d0;
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 1.8rem 5%; display: flex; justify-content: space-between; align-items: center;
            mix-blend-mode: difference;
        }
        .logo-container { height: 90px; }
        .logo-container img { height: 100%; filter: invert(1) contrast(1.2); }

        .hero {
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 2.8s ease;
            opacity: 0;
        }
        .hero-bg.active { opacity: 1; }

        .hero-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 5%;
        }
        .hero-content h1 {
            font-size: clamp(3.8rem, 11vw, 9rem);
            line-height: 0.85;
            font-weight: 900;
            letter-spacing: -6px;
            color: white;
            text-shadow: 0 4px 30px rgba(0,0,0,0.95);
            -webkit-text-stroke: 2px #111;
        }
        .tagline {
            font-size: clamp(1.5rem, 4.5vw, 2rem);
            margin: 1.2rem 0 1.8rem;
            color: var(--accent);
            text-shadow: 0 3px 20px #000;
        }
        .poetic {
            font-style: italic;
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto 2.5rem;
            text-shadow: 0 2px 15px #000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo stamp.png" alt="PATTERSON">
        </div>
        <nav>
            <a href="#work">Work</a>
            <a href="#shop">Acquire</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-bg active" style="background-image: url('art1.jpg');"></div>
        <div class="hero-bg" style="background-image: url('art2.jpg');"></div>
        <div class="hero-bg" style="background-image: url('art3.jpg');"></div>

        <div class="hero-content">
            <div>
                <h1>PHILLIP<br>PATTERSON</h1>
                <p class="tagline">Texture • Light • Frenzy</p>
                <p class="poetic">“The absence of my sanity was born”</p>
                <a href="#work" style="color:#c9a66b; font-size:1.5rem; text-decoration:none; border-bottom:2px solid #c9a66b; padding-bottom:8px;">Experience the Work →</a>
            </div>
        </div>
    </section>

    <!-- Paste your previous work, shop, contact, footer sections here if you want the full site -->

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.hero-bg');

        function nextSlide() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }

        setInterval(nextSlide, 4200); // nice slow pace
    </script>
</body>
</html>
