<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phillip Patterson • Texture • Light • Frenzy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --iridescent: linear-gradient(90deg, #c9a66b, #ff9ff3, #00f0ff, #c9a66b); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Helvetica Neue', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e8e0d0;
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 1.8rem 5%; display: flex; justify-content: space-between; align-items: center;
            mix-blend-mode: difference;
        }
        .logo-container { height: 90px; }
        .logo-container img { height: 100%; filter: invert(1) contrast(1.2); }

        .hero {
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 2.5s ease;
            opacity: 0;
        }
        .hero-bg.active { opacity: 1; }

        .hero-text {
            position: relative;
            z-index: 2;
            padding: 0 5%;
        }
        .hero-text h1 {
            font-size: clamp(3.5rem, 11vw, 9rem);
            line-height: 0.82;
            font-weight: 900;
            letter-spacing: -6px;
            color: #111;
            -webkit-text-stroke: 3px #e8e0d0;
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .tagline {
            font-size: clamp(1.4rem, 4vw, 1.85rem);
            letter-spacing: -1px;
            margin: 1rem 0 1.5rem;
            color: #c9a66b;
            text-shadow: 0 0 20px #000;
        }

        /* Special treatment for first slide */
        .hero-bg.first {
            background-color: #0a0a0a;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo stamp.png" alt="PATTERSON">
        </div>
        <nav>
            <a href="#work">Work</a>
            <a href="#shop">Acquire</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-bg first active" style="background-image: url('art1.jpg'); background-position: center;"></div>
        <div class="hero-bg" style="background-image: url('art2.jpg');"></div>
        <div class="hero-bg" style="background-image: url('art3.jpg');"></div>

        <div class="hero-text">
            <h1>PHILLIP<br>PATTERSON</h1>
            <p class="tagline">Texture • Light • Frenzy</p>
            <p style="font-style:italic; opacity:0.9; max-width:620px; margin:0 auto 2rem;">“The absence of my sanity was born”</p>
            <a href="#work" style="color:#c9a66b; font-size:1.45rem; text-decoration:none; border-bottom:2px solid #c9a66b; padding-bottom:8px;">Experience the Work →</a>
        </div>
    </section>

    <!-- Add the rest of your sections (work, shop, contact, footer) here from previous code -->

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.hero-bg');

        function nextSlide() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }

        setInterval(nextSlide, 3800); // slower transition
    </script>
</body>
</html>
