<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phillip Patterson • Texture • Light • Frenzy</title>
    <meta name="description" content="Sydney artist Phillip Patterson — textured mixed media and light-reactive works.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --iridescent: linear-gradient(90deg, #c9a66b, #ff9ff3, #00f0ff, #c9a66b); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Helvetica Neue', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e8e0d0;
            overflow-x: hidden;
        }
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 1.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            mix-blend-mode: difference;
        }
        .logo-container { height: 90px; }
        .logo-container img { height: 100%; filter: invert(1) contrast(1.2); }

        .hero {
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: opacity 2s ease-in-out;
            opacity: 0;
        }
        .hero-bg.active { opacity: 1; }

        .hero-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 5%;
        }
        .hero-content h1 {
            font-size: clamp(3.2rem, 10vw, 8.5rem);
            line-height: 0.85;
            font-weight: 900;
            letter-spacing: -6px;
            background: var(--iridescent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: clamp(1.4rem, 4vw, 1.85rem);
            letter-spacing: -1px;
            margin: 1.2rem 0 1.8rem;
            opacity: 0.95;
        }
        .poetic {
            font-style: italic;
            font-size: 1.15rem;
            opacity: 0.8;
            max-width: 620px;
            margin: 0 auto;
        }

        section { padding: 140px 5% 100px; }
        h2 { font-size: 3.8rem; text-align: center; margin-bottom: 3.5rem; letter-spacing: -2px; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.8rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        .art-card {
            position: relative;
            overflow: hidden;
            aspect-ratio: 5 / 4;
            cursor: pointer;
        }
        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .art-card:hover img {
            transform: scale(1.12) rotate(1deg);
            filter: contrast(1.15) saturate(1.3);
        }
        .info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1.5rem 1.5rem;
            background: linear-gradient(transparent, #0a0a0a);
            transform: translateY(60%);
            transition: transform 0.7s;
        }
        .art-card:hover .info { transform: translateY(0); }

        .cta-bar {
            background: #c9a66b;
            color: #111;
            text-align: center;
            padding: 2.8rem 5%;
            font-size: 1.35rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo stamp.png" alt="PATTERSON">
        </div>
        <nav>
            <a href="#work">Work</a>
            <a href="#shop">Acquire</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-bg active" style="background-image: url('art1.jpg');"></div>
        <div class="hero-bg" style="background-image: url('art2.jpg');"></div>
        <div class="hero-bg" style="background-image: url('art3.jpg');"></div>

        <div class="hero-content">
            <div>
                <h1>PHILLIP<br>PATTERSON</h1>
                <p class="tagline">Texture • Light • Frenzy</p>
                <p class="poetic">“The absence of my sanity was born”</p>
                <a href="#work" style="color:#c9a66b; font-size:1.4rem; text-decoration:none; border-bottom:2px solid #c9a66b; padding-bottom:8px; margin-top:2rem; display:inline-block;">Experience the Work →</a>
            </div>
        </div>
    </section>

                    <p>Faceted panel • Neon-iridescent acrylic</p>
