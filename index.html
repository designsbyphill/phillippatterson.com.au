<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phillip Patterson • Texture • Light • Frenzy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --iridescent: linear-gradient(90deg, #c9a66b, #ff9ff3, #00f0ff, #c9a66b); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Helvetica Neue', system-ui, sans-serif; background: #0a0a0a; color: #e8e0d0; }

        .fixed-logo {
            position: fixed;
            top: 25px;
            left: 5%;
            z-index: 2000;
            height: 95px;
            cursor: pointer;
        }
        .fixed-logo img { height: 100%; filter: invert(1) contrast(1.2); }

        .hero {
            height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10,10,10,0.65);
        }
        .hero-content h1 {
            font-size: clamp(4rem, 12vw, 9.5rem);
            line-height: 0.82;
            font-weight: 900;
            letter-spacing: -7px;
            background: var(--iridescent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Fixed Logo -->
    <div class="fixed-logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <img src="logo.png" alt="PATTERSON">
    </div>

    <section class="hero" id="hero">
        <div class="hero-content">
            <div>
                <h1>PHILLIP<br>PATTERSON</h1>
                <p style="font-size:1.9rem; margin:1.5rem 0 2.5rem;">Texture • Light • Frenzy</p>
                <p style="font-style:italic; font-size:1.25rem; opacity:0.85;">“The absence of my sanity was born”</p>
                <a href="#work" style="color:#c9a66b; font-size:1.55rem; text-decoration:none; border-bottom:2px solid #c9a66b; padding-bottom:8px; margin-top:2rem; display:inline-block;">Experience the Work →</a>
            </div>
        </div>
    </section>

    <section id="work" style="padding:140px 5% 100px;">
        <h2 style="text-align:center; font-size:3.8rem; margin-bottom:3rem;">Recent Surfaces</h2>
        <!-- Your gallery images here -->
    </section>

    <script>
        const images = ['art1.jpg', 'art2.jpg', 'art3.jpg'];
        const randomImage = images[Math.floor(Math.random() * images.length)];
        document.getElementById('hero').style.backgroundImage = `linear-gradient(rgba(10,10,10,0.65), rgba(10,10,10,0.8)), url('${randomImage}')`;
    </script>
</body>
</html>
